name: Automated Sarkari Job Scraper

on:
  schedule:
    # Har roz subah 6:00 AM IST par automatic chalega (UTC 12:30 AM)
    - cron: '30 0 * * *'
  workflow_dispatch: # Isse aap manually bhi "Run" button daba kar chala sakte hain

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Chrome Driver (For Headless Scraping)
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pdfplumber beautifulsoup4 selenium google-genai python-dotenv supabase

    - name: Run Scraper Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python ai_aggregator.py