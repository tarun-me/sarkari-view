name: Automated Sarkari Job Scraper

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Remove mismatched pre-installed ChromeDriver
      run: |
        sudo rm -f /usr/bin/chromedriver

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # 🔥 Added groq library
        pip install requests pdfplumber beautifulsoup4 selenium groq python-dotenv supabase

    - name: Run Scraper Script
      env:
        # 🔥 Switched to GROQ Key
        SECRET_KRY: ${{ secrets.GROQ_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python ai_aggregator.py
